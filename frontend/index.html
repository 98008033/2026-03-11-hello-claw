<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Claw 🧞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* 背景特效层 */
        .bg-effects {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        /* 背景闪电 - 超明显 */
        .lightning-bolt {
            position: absolute;
            width: 8px;
            background: linear-gradient(to bottom, #fff 0%, #00d9f5 50%, transparent 100%);
            box-shadow: 0 0 30px #00d9f5, 0 0 60px #00d9f5, 0 0 100px #00d9f5, 0 0 150px #00d9f5;
            border-radius: 4px;
            opacity: 0;
            transform-origin: top center;
            z-index: 5;
        }

        .lightning-bolt.strike {
            animation: lightningBoltStrike 0.4s ease-out;
        }

        @keyframes lightningBoltStrike {
            0% { opacity: 1; height: 0; }
            30% { opacity: 1; height: var(--height); }
            50% { opacity: 0.8; height: var(--height); }
            70% { opacity: 1; height: var(--height); }
            100% { opacity: 0; height: var(--height); }
        }

        /* 背景光球 */
        .orb {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(0,217,245,0.6) 40%, transparent 70%);
            filter: blur(30px);
            opacity: 0;
            transform: scale(0);
            box-shadow: 0 0 60px rgba(0,217,245,0.8), 0 0 120px rgba(0,217,245,0.5);
        }

        .orb.pulse {
            animation: orbPulse 1.2s ease-out forwards;
        }

        @keyframes orbPulse {
            0% { opacity: 1; transform: scale(0); }
            50% { opacity: 0.9; transform: scale(1.5); }
            100% { opacity: 0; transform: scale(3); }
        }

        /* 背景网格 */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0,217,245,0.15) 2px, transparent 2px),
                linear-gradient(90deg, rgba(0,217,245,0.15) 2px, transparent 2px);
            background-size: 60px 60px;
            pointer-events: none;
            z-index: 2;
            opacity: 0;
        }

        .grid-overlay.active {
            opacity: 1;
            animation: gridPulse 0.6s ease;
        }

        @keyframes gridPulse {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* 背景颜色叠加层 */
        .bg-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 3;
            opacity: 0;
            mix-blend-mode: overlay;
        }

        .bg-overlay.flash-cyan {
            background: radial-gradient(circle, rgba(0,217,245,0.8) 0%, transparent 60%);
            animation: bgFlash 0.5s ease-out;
        }

        .bg-overlay.flash-white {
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, transparent 50%);
            animation: bgFlash 0.4s ease-out;
        }

        @keyframes bgFlash {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
            z-index: 10;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .count-display {
            font-size: 6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin: 20px 0;
            transition: transform 0.1s ease;
        }

        .count-display.pop {
            transform: scale(1.3);
        }

        .claw-button {
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.4);
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .claw-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 107, 107, 0.6);
        }

        .claw-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        .claw-button.clicked {
            animation: buttonShake 0.3s ease;
        }

        .claw-button.mega-mode {
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
            background-size: 200% 200%;
            animation: gradientShift 0.3s ease infinite;
            box-shadow: 0 0 80px rgba(255, 107, 107, 1), 0 0 150px rgba(79, 172, 254, 0.8);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes buttonShake {
            0%, 100% { transform: rotate(0deg) scale(0.95); }
            25% { transform: rotate(-8deg) scale(0.95); }
            75% { transform: rotate(8deg) scale(0.95); }
        }

        .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }

        /* 倒计时条 */
        .timer-container {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .timer-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .timer-bar {
            width: 100%;
            height: 16px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #00f5a0, #00d9f5);
            border-radius: 10px;
            transition: width 0.1s linear;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,217,245,0.8);
        }

        .timer-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.5),
                transparent
            );
            animation: shimmer 0.8s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .timer-progress.warning {
            background: linear-gradient(90deg, #feca57, #ff9f43);
            box-shadow: 0 0 20px rgba(254,202,87,0.8);
        }

        .timer-progress.danger {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            animation: pulse 0.3s ease infinite;
            box-shadow: 0 0 30px rgba(255,107,107,1);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scaleX(1); }
            50% { opacity: 0.8; transform: scaleX(1.02); }
        }

        .timer-display {
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.8);
        }

        /* ========== 粒子效果系统 ========== */
        
        /* 基础粒子 */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: particleFly 1.5s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
            font-size: 2rem;
            z-index: 100;
            filter: drop-shadow(0 0 10px currentColor);
        }

        @keyframes particleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1.5) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot));
            }
        }

        /* 闪电粒子 - 超明显 */
        .lightning-particle {
            position: absolute;
            width: 6px;
            height: 120px;
            background: linear-gradient(to bottom, #fff 0%, #00d9f5 30%, #0099cc 70%, transparent 100%);
            box-shadow: 0 0 20px #00d9f5, 0 0 40px #00d9f5, 0 0 60px #00d9f5, 0 0 80px #00d9f5;
            border-radius: 3px;
            pointer-events: none;
            opacity: 0;
            transform-origin: center top;
            z-index: 99;
        }

        .lightning-particle.shoot {
            animation: lightningShoot 0.8s ease-out forwards;
        }

        @keyframes lightningShoot {
            0% { 
                opacity: 1; 
                transform: translateY(0) scaleY(0) rotate(var(--rot));
                filter: brightness(2);
            }
            20% { 
                opacity: 1; 
                transform: translateY(calc(var(--ty) * 0.2)) scaleY(1.2) rotate(var(--rot));
                filter: brightness(1.5);
            }
            100% { 
                opacity: 0; 
                transform: translateY(var(--ty)) scaleY(0.3) rotate(var(--rot));
            }
        }

        /* 火花粒子 */
        .spark {
            position: absolute;
            width: 10px;
            height: 10px;
            background: radial-gradient(circle, #fff 0%, #feca57 40%, transparent 80%);
            border-radius: 50%;
            pointer-events: none;
            box-shadow: 0 0 20px #feca57, 0 0 40px #ff6b6b, 0 0 60px #ff6b6b;
            opacity: 0;
            z-index: 98;
        }

        .spark.fly {
            animation: sparkFly 1s ease-out forwards;
        }

        @keyframes sparkFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1.5);
            }
            50% {
                opacity: 1;
                transform: translate(calc(var(--tx) * 0.5), calc(var(--ty) * 0.5)) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* 星星粒子 */
        .star-particle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #fff, #feca57);
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            box-shadow: 0 0 30px #feca57, 0 0 60px #feca57;
            pointer-events: none;
            opacity: 0;
            z-index: 97;
        }

        .star-particle.shoot {
            animation: starShoot 1.2s ease-out forwards;
        }

        @keyframes starShoot {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(2) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(720deg);
            }
        }

        /* 大型粒子 */
        .particle-large {
            font-size: 6rem;
            z-index: 100;
            filter: drop-shadow(0 0 20px currentColor);
        }

        /* 爆炸粒子 */
        .particle-explosion {
            font-size: 7rem;
            animation: explosionFly 1.8s ease-out forwards;
            filter: drop-shadow(0 0 30px currentColor);
        }

        @keyframes explosionFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translate(var(--tx), var(--ty)) scale(1.8) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--tx) * 2), calc(var(--ty) * 2)) scale(0) rotate(360deg);
            }
        }

        /* ========== 波纹效果 ========== */
        
        .ripple-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 50;
        }

        .ripple {
            position: absolute;
            border-radius: 50%;
            border: 6px solid rgba(255, 255, 255, 1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.8), inset 0 0 30px rgba(255, 255, 255, 0.5), 0 0 60px rgba(255, 255, 255, 0.6);
            transform: scale(0);
            pointer-events: none;
        }

        .ripple.animate {
            animation: rippleExpand 1.2s ease-out forwards;
        }

        @keyframes rippleExpand {
            0% {
                transform: scale(0);
                opacity: 1;
                border-width: 6px;
            }
            50% {
                opacity: 0.8;
                border-width: 4px;
            }
            100% {
                transform: scale(4);
                opacity: 0;
                border-width: 0px;
            }
        }

        /* 大型波纹 */
        .ripple-mega {
            border: 10px solid rgba(0, 217, 245, 1);
            box-shadow: 0 0 60px rgba(0, 217, 245, 1), inset 0 0 60px rgba(0, 217, 245, 0.8), 0 0 120px rgba(0, 217, 245, 0.6);
        }

        /* 多重波纹 */
        .ripple-multi {
            position: absolute;
            border-radius: 50%;
            border: 4px solid rgba(255, 107, 107, 0.9);
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.8);
            transform: scale(0);
            pointer-events: none;
        }

        .ripple-multi.animate {
            animation: rippleMultiExpand 1s ease-out forwards;
        }

        @keyframes rippleMultiExpand {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(3);
                opacity: 0;
            }
        }

        /* ========== 连击显示 ========== */
        
        .combo {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1.8rem;
            font-weight: bold;
            box-shadow: 0 5px 30px rgba(0, 0, 0, 0.5), 0 0 40px rgba(255, 107, 107, 0.6);
            opacity: 0;
            transform: translateY(-20px) scale(0.8);
            transition: all 0.3s ease;
            z-index: 1000;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }

        .combo.show {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .combo.pop {
            animation: comboPop 0.3s ease;
        }

        @keyframes comboPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        .combo.mega-combo {
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
            background-size: 200% 200%;
            animation: gradientShift 0.3s ease infinite, comboGlow 0.4s ease infinite;
            font-size: 3rem;
            padding: 30px 50px;
            box-shadow: 0 0 60px rgba(240, 147, 251, 1), 0 0 120px rgba(79, 172, 254, 0.8), 0 0 180px rgba(245, 87, 108, 0.6);
        }

        @keyframes comboGlow {
            0%, 100% { 
                box-shadow: 0 0 60px rgba(240, 147, 251, 1), 0 0 120px rgba(79, 172, 254, 0.8);
                transform: translateY(0) scale(1);
            }
            50% { 
                box-shadow: 0 0 100px rgba(240, 147, 251, 1), 0 0 180px rgba(79, 172, 254, 1), 0 0 250px rgba(245, 87, 108, 0.8);
                transform: translateY(-10px) scale(1.1);
            }
        }

        /* ========== 屏幕特效 ========== */
        
        .screen-shake {
            animation: screenShake 0.6s cubic-bezier(0.36, 0.07, 0.19, 0.97);
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-20px, -20px); }
            20% { transform: translate(20px, 20px); }
            30% { transform: translate(-20px, 20px); }
            40% { transform: translate(20px, -20px); }
            50% { transform: translate(-20px, -20px); }
            60% { transform: translate(20px, 20px); }
            70% { transform: translate(-20px, 20px); }
            80% { transform: translate(20px, -20px); }
            90% { transform: translate(-20px, -20px); }
        }

        /* 闪光效果 - 超明显 */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(0,217,245,0.8) 40%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            z-index: 9998;
        }

        .flash-overlay.flash {
            animation: flashEffect 0.7s ease-out;
        }

        @keyframes flashEffect {
            0% { opacity: 1; }
            30% { opacity: 0.8; }
            60% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 背景颜色脉冲 */
        .bg-pulse {
            animation: bgPulse 0.6s ease;
        }

        @keyframes bgPulse {
            0%, 100% { filter: none; }
            50% { filter: saturate(3) brightness(1.5) hue-rotate(30deg); }
        }

        /* 点击位置光环 */
        .click-glow {
            position: fixed;
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,107,107,0.8) 40%, transparent 70%);
            box-shadow: 0 0 60px rgba(255,107,107,1), 0 0 120px rgba(255,107,107,0.6);
            transform: translate(-50%, -50%) scale(0);
            pointer-events: none;
            z-index: 999;
            opacity: 0;
        }

        .click-glow.animate {
            animation: clickGlowExpand 0.6s ease-out forwards;
        }

        @keyframes clickGlowExpand {
            0% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(0.5);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(3);
            }
        }

        /* 加载状态 */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <!-- 背景特效层 -->
    <div class="bg-effects" id="bgEffects"></div>
    <div class="grid-overlay" id="gridOverlay"></div>
    <div class="bg-overlay" id="bgOverlay"></div>
    <div class="ripple-container" id="rippleContainer"></div>
    
    <div class="container">
        <h1>🧞 Hello Claw</h1>
        <p class="subtitle">点击神灯，许愿计数！</p>
        
        <div class="count-display" id="countDisplay">0</div>
        
        <button class="claw-button" id="clawButton">
            <span class="emoji">🪄</span>
            点击我！
        </button>
        
        <div class="timer-container">
            <div class="timer-label">⏱️ 重置倒计时</div>
            <div class="timer-bar">
                <div class="timer-progress" id="timerProgress"></div>
            </div>
            <div class="timer-display" id="timerDisplay">准备</div>
        </div>
    </div>

    <div class="combo" id="combo">🔥 Combo x1</div>
    <div class="flash-overlay" id="flashOverlay"></div>

    <script>
        const API_BASE = 'http://localhost:10000/api';
        
        let count = 0;
        let combo = 0;
        let comboTimer = null;
        let isClicking = false;
        
        const RESET_TIME = 5000;
        let timeRemaining = RESET_TIME;
        let lastUpdateTime = Date.now();
        let timerRunning = false;
        let hasStarted = false;

        const countDisplay = document.getElementById('countDisplay');
        const clawButton = document.getElementById('clawButton');
        const comboDisplay = document.getElementById('combo');
        const timerProgress = document.getElementById('timerProgress');
        const timerDisplay = document.getElementById('timerDisplay');
        const flashOverlay = document.getElementById('flashOverlay');
        const bgEffects = document.getElementById('bgEffects');
        const gridOverlay = document.getElementById('gridOverlay');
        const bgOverlay = document.getElementById('bgOverlay');
        const rippleContainer = document.getElementById('rippleContainer');

        async function fetchCount() {
            try {
                const response = await fetch(`${API_BASE}/count`);
                const data = await response.json();
                count = data.count;
                updateDisplay(false);
            } catch (error) {
                console.error('Failed to fetch count:', error);
            }
        }

        async function incrementCount() {
            if (isClicking) return;
            isClicking = true;

            if (!hasStarted) {
                hasStarted = true;
                timerRunning = true;
                lastUpdateTime = Date.now();
            }
            timeRemaining = RESET_TIME;

            try {
                const response = await fetch(`${API_BASE}/increment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ amount: 1 }),
                });

                const data = await response.json();
                count = data.count;
                updateDisplay(true);
                
                // 获取点击位置
                const buttonRect = clawButton.getBoundingClientRect();
                const centerX = buttonRect.left + buttonRect.width / 2;
                const centerY = buttonRect.top + buttonRect.height / 2;
                
                // 基础粒子效果
                createParticles(centerX, centerY);
                createClickGlow(centerX, centerY);
                updateCombo();
                
                // 10+ 连击：增强特效
                if (combo >= 10 && combo % 10 === 0) {
                    createLargeParticles(centerX, centerY);
                    createRipple(centerX, centerY, false);
                    createSparks(centerX, centerY);
                    createMultiRipples(centerX, centerY);
                }
                
                // 50+ 连击：爆炸特效
                if (combo >= 50 && combo % 50 === 0) {
                    createExplosionEffect(centerX, centerY);
                    triggerScreenShake();
                    triggerFlash();
                    createBackgroundOrbs();
                    createGridPulse();
                    triggerBgFlash('cyan');
                }
                
                // 100+ 连击：闪电风暴
                if (combo >= 100 && combo % 100 === 0) {
                    createLightningStorm();
                    triggerMegaExplosion(centerX, centerY);
                    triggerBgFlash('white');
                }
            } catch (error) {
                console.error('Failed to increment:', error);
                count++;
                updateDisplay(true);
                const buttonRect = clawButton.getBoundingClientRect();
                createParticles(buttonRect.left + buttonRect.width / 2, buttonRect.top + buttonRect.height / 2);
                updateCombo();
            }

            setTimeout(() => { isClicking = false; }, 100);
        }

        async function resetCount() {
            try {
                await fetch(`${API_BASE}/reset`, { method: 'POST' });
            } catch (error) {
                console.error('Failed to reset:', error);
            }
            count = 0;
            combo = 0;
            timeRemaining = RESET_TIME;
            timerRunning = false;
            hasStarted = false;
            updateDisplay(false);
            hideCombo();
            updateTimerDisplay();
            clawButton.classList.remove('mega-mode');
        }

        function updateDisplay(animate) {
            countDisplay.textContent = count;
            if (animate) {
                countDisplay.classList.add('pop');
                setTimeout(() => countDisplay.classList.remove('pop'), 100);
            }
        }

        function updateCombo() {
            combo++;
            const isMegaCombo = combo >= 50;
            
            if (combo > 1) {
                comboDisplay.textContent = `🔥 Combo x${combo}`;
                comboDisplay.classList.add('show', 'pop');
                
                if (isMegaCombo) {
                    comboDisplay.classList.add('mega-combo');
                    clawButton.classList.add('mega-mode');
                } else if (combo >= 10) {
                    comboDisplay.classList.remove('mega-combo');
                }
                
                setTimeout(() => comboDisplay.classList.remove('pop'), 100);
            } else {
                comboDisplay.textContent = `🔥 Combo x${combo}`;
                comboDisplay.classList.add('show');
            }

            if (comboTimer) clearTimeout(comboTimer);
            comboTimer = setTimeout(() => {
                hideCombo();
                combo = 0;
                clawButton.classList.remove('mega-mode');
            }, 2000);
        }

        function hideCombo() {
            comboDisplay.classList.remove('show', 'mega-combo');
        }

        function updateTimer() {
            const now = Date.now();
            const delta = now - lastUpdateTime;
            lastUpdateTime = now;
            
            if (timerRunning && timeRemaining > 0) {
                timeRemaining -= delta;
                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    resetCount();
                }
                updateTimerDisplay();
            } else if (!hasStarted) {
                updateTimerDisplay();
            }
            
            requestAnimationFrame(updateTimer);
        }

        function updateTimerDisplay() {
            if (!hasStarted) {
                timerDisplay.textContent = '准备';
                timerProgress.style.width = '0%';
                timerProgress.classList.remove('warning', 'danger');
                return;
            }
            
            const seconds = timeRemaining / 1000;
            timerDisplay.textContent = `${seconds.toFixed(1)}s`;
            
            const progress = (timeRemaining / RESET_TIME) * 100;
            timerProgress.style.width = `${progress}%`;
            
            timerProgress.classList.remove('warning', 'danger');
            if (seconds <= 1) timerProgress.classList.add('danger');
            else if (seconds <= 2) timerProgress.classList.add('warning');
        }

        // ========== 粒子效果系统 ==========
        
        function createParticles(x, y) {
            const emojis = ['✨', '🌟', '⭐', '💫', '🧞', '🪄', '⚡', '💎'];
            let particleCount = 24;
            if (combo >= 50) particleCount = 80;
            else if (combo >= 10) particleCount = 48;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const angle = (i / particleCount) * Math.PI * 2 + Math.random() * 0.8;
                const distance = 400 + Math.random() * 500;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rot = (Math.random() - 0.5) * 1440;
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                particle.style.setProperty('--rot', `${rot}deg`);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1500);
            }
        }

        function createLightningParticles(x, y, count = 30) {
            for (let i = 0; i < count; i++) {
                const lightning = document.createElement('div');
                lightning.className = 'lightning-particle shoot';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 300 + Math.random() * 500;
                const ty = Math.sin(angle) * distance;
                const rot = (Math.random() - 0.5) * 90;
                
                lightning.style.left = `${x}px`;
                lightning.style.top = `${y}px`;
                lightning.style.setProperty('--ty', `${ty}px`);
                lightning.style.setProperty('--rot', `${rot}deg`);
                
                document.body.appendChild(lightning);
                setTimeout(() => lightning.remove(), 800);
            }
        }

        function createSparks(x, y) {
            for (let i = 0; i < 40; i++) {
                const spark = document.createElement('div');
                spark.className = 'spark fly';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 400 + Math.random() * 400;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                spark.style.left = `${x}px`;
                spark.style.top = `${y}px`;
                spark.style.setProperty('--tx', `${tx}px`);
                spark.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(spark);
                setTimeout(() => spark.remove(), 1000);
            }
        }

        function createStarParticles(x, y, count = 20) {
            for (let i = 0; i < count; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle shoot';
                
                const angle = Math.random() * Math.PI * 2;
                const distance = 350 + Math.random() * 350;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                star.style.left = `${x}px`;
                star.style.top = `${y}px`;
                star.style.setProperty('--tx', `${tx}px`);
                star.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(star);
                setTimeout(() => star.remove(), 1200);
            }
        }

        function createLargeParticles(x, y) {
            const emojis = ['🎆', '🎇', '💥', '🌈', '⚡', '💎', '🔥', '⭐'];
            for (let i = 0; i < 16; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle particle-large';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const angle = (i / 16) * Math.PI * 2;
                const distance = 450 + Math.random() * 300;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rot = (Math.random() - 0.5) * 720;
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                particle.style.setProperty('--rot', `${rot}deg`);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 1800);
            }
        }

        function createExplosionEffect(x, y) {
            const emojis = ['🎆', '🎇', '💥', '🌟', '✨', '🧞', '⚡', '🌈', '🔥', '💫'];
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle particle-explosion';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const angle = (i / 50) * Math.PI * 2;
                const distance = 500 + Math.random() * 400;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.left = `${x}px`;
                particle.style.top = `${y}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(particle);
                setTimeout(() => particle.remove(), 2000);
            }
        }

        function triggerMegaExplosion(x, y) {
            createExplosionEffect(x, y);
            setTimeout(() => createExplosionEffect(x, y), 150);
            setTimeout(() => createExplosionEffect(x, y), 300);
            createStarParticles(x, y, 30);
        }

        // ========== 点击位置光环 ==========
        
        function createClickGlow(x, y) {
            const glow = document.createElement('div');
            glow.className = 'click-glow animate';
            glow.style.left = `${x}px`;
            glow.style.top = `${y}px`;
            
            document.body.appendChild(glow);
            setTimeout(() => glow.remove(), 600);
        }

        // ========== 波纹效果 ==========
        
        function createRipple(x, y, isMega = false) {
            const ripple = document.createElement('div');
            ripple.className = `ripple ${isMega ? 'ripple-mega' : ''}`;
            ripple.style.left = `${x - 100}px`;
            ripple.style.top = `${y - 100}px`;
            ripple.style.width = '200px';
            ripple.style.height = '200px';
            
            rippleContainer.appendChild(ripple);
            
            setTimeout(() => {
                ripple.classList.add('animate');
            }, 10);
            
            setTimeout(() => ripple.remove(), 1200);
        }

        function createMultiRipples(x, y) {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple-multi animate';
                    ripple.style.left = `${x - 80}px`;
                    ripple.style.top = `${y - 80}px`;
                    ripple.style.width = '160px';
                    ripple.style.height = '160px';
                    
                    rippleContainer.appendChild(ripple);
                    setTimeout(() => ripple.remove(), 1000);
                }, i * 150);
            }
        }

        // ========== 背景特效 ==========
        
        function createBackgroundOrbs() {
            for (let i = 0; i < 8; i++) {
                setTimeout(() => {
                    const orb = document.createElement('div');
                    orb.className = 'orb pulse';
                    orb.style.width = `${150 + Math.random() * 200}px`;
                    orb.style.height = orb.style.width;
                    orb.style.left = `${Math.random() * 100}%`;
                    orb.style.top = `${Math.random() * 100}%`;
                    
                    bgEffects.appendChild(orb);
                    setTimeout(() => orb.remove(), 1200);
                }, i * 120);
            }
        }

        function createGridPulse() {
            gridOverlay.classList.add('active');
            setTimeout(() => gridOverlay.classList.remove('active'), 600);
        }

        function triggerBgFlash(type) {
            bgOverlay.className = `bg-overlay flash-${type}`;
            setTimeout(() => {
                bgOverlay.className = 'bg-overlay';
            }, 700);
        }

        function createLightningStorm() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // 背景闪电 - 多道闪电
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const lightning = document.createElement('div');
                    lightning.className = 'lightning-bolt strike';
                    lightning.style.left = `${Math.random() * width}px`;
                    lightning.style.top = '0';
                    const boltHeight = 300 + Math.random() * 500;
                    lightning.style.height = `${boltHeight}px`;
                    lightning.style.setProperty('--height', `${boltHeight}px`);
                    
                    bgEffects.appendChild(lightning);
                    setTimeout(() => lightning.remove(), 400);
                }, i * 80);
            }
            
            // 闪电粒子
            const buttonRect = clawButton.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;
            createLightningParticles(centerX, centerY, 50);
            
            // 背景颜色脉冲
            document.body.classList.add('bg-pulse');
            setTimeout(() => document.body.classList.remove('bg-pulse'), 600);
        }

        // ========== 屏幕特效 ==========
        
        function triggerScreenShake() {
            document.body.classList.add('screen-shake');
            setTimeout(() => document.body.classList.remove('screen-shake'), 600);
        }

        function triggerFlash() {
            flashOverlay.classList.add('flash');
            setTimeout(() => flashOverlay.classList.remove('flash'), 700);
        }

        // 事件监听
        clawButton.addEventListener('click', (e) => {
            clawButton.classList.add('clicked');
            setTimeout(() => clawButton.classList.remove('clicked'), 300);
            incrementCount();
        });

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                clawButton.click();
            }
        });

        // 初始化
        fetchCount();
        updateTimerDisplay();
        updateTimer();
    </script>
</body>
</html>
