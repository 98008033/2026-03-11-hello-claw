<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Claw 🧞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .count-display {
            font-size: 6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin: 30px 0;
            transition: transform 0.1s ease;
        }

        .count-display.pop {
            transform: scale(1.3);
        }

        .claw-button {
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.4);
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .claw-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 107, 107, 0.6);
        }

        .claw-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        .claw-button.clicked {
            animation: buttonShake 0.3s ease;
        }

        @keyframes buttonShake {
            0%, 100% { transform: rotate(0deg) scale(0.95); }
            25% { transform: rotate(-5deg) scale(0.95); }
            75% { transform: rotate(5deg) scale(0.95); }
        }

        .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: particleFly 1s ease-out forwards;
            font-size: 1.5rem;
        }

        @keyframes particleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* 波纹效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 连击显示 */
        .combo {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
        }

        .combo.show {
            opacity: 1;
            transform: translateY(0);
        }

        .combo.pop {
            animation: comboPop 0.3s ease;
        }

        @keyframes comboPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 加载状态 */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }

        .reset-btn {
            margin-top: 30px;
            background: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: #fff;
            padding: 10px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .reset-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            border-color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧞 Hello Claw</h1>
        <p class="subtitle">点击神灯，许愿计数！</p>
        
        <div class="count-display" id="countDisplay">0</div>
        
        <button class="claw-button" id="clawButton">
            <span class="emoji">🪄</span>
            点击我！
        </button>
        
        <br>
        
        <button class="reset-btn" id="resetBtn">重置计数</button>
    </div>

    <div class="combo" id="combo">🔥 Combo x1</div>

    <script>
        const API_BASE = 'http://localhost:8080/api';
        
        let count = 0;
        let combo = 0;
        let comboTimer = null;
        let isClicking = false;

        const countDisplay = document.getElementById('countDisplay');
        const clawButton = document.getElementById('clawButton');
        const comboDisplay = document.getElementById('combo');
        const resetBtn = document.getElementById('resetBtn');

        // 获取当前计数
        async function fetchCount() {
            try {
                const response = await fetch(`${API_BASE}/count`);
                const data = await response.json();
                count = data.count;
                updateDisplay(false);
            } catch (error) {
                console.error('Failed to fetch count:', error);
            }
        }

        // 增加计数
        async function incrementCount() {
            if (isClicking) return;
            isClicking = true;

            try {
                const response = await fetch(`${API_BASE}/increment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ amount: 1 }),
                });

                const data = await response.json();
                count = data.count;
                updateDisplay(true);
                createParticles();
                updateCombo();
            } catch (error) {
                console.error('Failed to increment:', error);
                // 本地计数作为后备
                count++;
                updateDisplay(true);
                createParticles();
                updateCombo();
            }

            setTimeout(() => {
                isClicking = false;
            }, 100);
        }

        // 重置计数
        async function resetCount() {
            try {
                await fetch(`${API_BASE}/reset`, {
                    method: 'POST',
                });
                count = 0;
                combo = 0;
                updateDisplay(false);
                hideCombo();
            } catch (error) {
                console.error('Failed to reset:', error);
            }
        }

        // 更新显示
        function updateDisplay(animate) {
            countDisplay.textContent = count;
            
            if (animate) {
                countDisplay.classList.add('pop');
                setTimeout(() => {
                    countDisplay.classList.remove('pop');
                }, 100);
            }
        }

        // 更新连击
        function updateCombo() {
            combo++;
            
            if (combo > 1) {
                comboDisplay.textContent = `🔥 Combo x${combo}`;
                comboDisplay.classList.add('show', 'pop');
                
                setTimeout(() => {
                    comboDisplay.classList.remove('pop');
                }, 100);
            } else {
                comboDisplay.textContent = `🔥 Combo x${combo}`;
                comboDisplay.classList.add('show');
            }

            // 清除之前的定时器
            if (comboTimer) {
                clearTimeout(comboTimer);
            }

            // 2 秒后连击消失
            comboTimer = setTimeout(() => {
                hideCombo();
                combo = 0;
            }, 2000);
        }

        // 隐藏连击
        function hideCombo() {
            comboDisplay.classList.remove('show');
        }

        // 创建粒子效果
        function createParticles() {
            const emojis = ['✨', '🌟', '⭐', '💫', '🧞', '🪄'];
            const buttonRect = clawButton.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;

            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const angle = (i / 12) * Math.PI * 2;
                const distance = 150 + Math.random() * 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.left = `${centerX}px`;
                particle.style.top = `${centerY}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // 创建波纹效果
        function createRipple(event) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            ripple.style.left = `${event.clientX - 50}px`;
            ripple.style.top = `${event.clientY - 50}px`;
            
            document.body.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);
        }

        // 事件监听
        clawButton.addEventListener('click', (e) => {
            clawButton.classList.add('clicked');
            setTimeout(() => {
                clawButton.classList.remove('clicked');
            }, 300);
            
            createRipple(e);
            incrementCount();
        });

        // 支持键盘空格键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                clawButton.click();
            }
        });

        resetBtn.addEventListener('click', resetCount);

        // 初始化
        fetchCount();
    </script>
</body>
</html>
