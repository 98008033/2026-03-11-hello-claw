<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Claw 🧞</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 60px 80px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            position: relative;
        }

        h1 {
            color: #fff;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.8);
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        .count-display {
            font-size: 6rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            margin: 20px 0;
            transition: transform 0.1s ease;
        }

        .count-display.pop {
            transform: scale(1.3);
        }

        .count-display.mega-pop {
            animation: megaPop 0.5s ease;
        }

        @keyframes megaPop {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.5) rotate(-5deg); }
            50% { transform: scale(1.8) rotate(5deg); }
            75% { transform: scale(1.3) rotate(-5deg); }
        }

        .claw-button {
            position: relative;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            border: none;
            border-radius: 50%;
            width: 200px;
            height: 200px;
            font-size: 1.5rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(255, 107, 107, 0.4);
            transition: all 0.1s ease;
            outline: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .claw-button:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 50px rgba(255, 107, 107, 0.6);
        }

        .claw-button:active {
            transform: scale(0.95);
            box-shadow: 0 5px 20px rgba(255, 107, 107, 0.3);
        }

        .claw-button.clicked {
            animation: buttonShake 0.3s ease;
        }

        .claw-button.mega-mode {
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
            background-size: 200% 200%;
            animation: gradientShift 0.5s ease infinite;
            box-shadow: 0 0 60px rgba(255, 107, 107, 0.8), 0 0 100px rgba(79, 172, 254, 0.6);
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes buttonShake {
            0%, 100% { transform: rotate(0deg) scale(0.95); }
            25% { transform: rotate(-5deg) scale(0.95); }
            75% { transform: rotate(5deg) scale(0.95); }
        }

        .emoji {
            font-size: 4rem;
            display: block;
            margin-bottom: 10px;
        }

        /* 倒计时条 */
        .timer-container {
            margin-top: 30px;
            width: 100%;
            max-width: 400px;
            margin-left: auto;
            margin-right: auto;
        }

        .timer-label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        .timer-bar {
            width: 100%;
            height: 12px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, #00f5a0, #00d9f5);
            border-radius: 10px;
            transition: width 0.1s linear;
            position: relative;
            overflow: hidden;
        }

        .timer-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.3),
                transparent
            );
            animation: shimmer 1s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .timer-progress.warning {
            background: linear-gradient(90deg, #feca57, #ff9f43);
        }

        .timer-progress.danger {
            background: linear-gradient(90deg, #ff6b6b, #ee5a24);
            animation: pulse 0.5s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .timer-display {
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            margin-top: 8px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        /* 粒子效果 */
        .particle {
            position: absolute;
            pointer-events: none;
            animation: particleFly 1s ease-out forwards;
            font-size: 1.5rem;
        }

        @keyframes particleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0) rotate(var(--rot));
            }
        }

        /* 大型粒子 */
        .particle-large {
            font-size: 3rem;
            z-index: 100;
        }

        /* 爆炸粒子 */
        .particle-explosion {
            font-size: 4rem;
            animation: explosionFly 1.5s ease-out forwards;
        }

        @keyframes explosionFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1) rotate(0deg);
            }
            50% {
                opacity: 1;
                transform: translate(var(--tx), var(--ty)) scale(1.5) rotate(180deg);
            }
            100% {
                opacity: 0;
                transform: translate(calc(var(--tx) * 2), calc(var(--ty) * 2)) scale(0) rotate(360deg);
            }
        }

        /* 波纹效果 */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.6);
            transform: scale(0);
            animation: rippleEffect 0.6s ease-out;
            pointer-events: none;
        }

        @keyframes rippleEffect {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        /* 大型波纹 */
        .ripple-large {
            background: rgba(255, 255, 255, 0.3);
            border: 3px solid rgba(255, 255, 255, 0.8);
            animation: rippleLargeEffect 1s ease-out;
        }

        @keyframes rippleLargeEffect {
            0% {
                transform: scale(0);
                opacity: 1;
            }
            100% {
                transform: scale(8);
                opacity: 0;
            }
        }

        /* 连击显示 */
        .combo {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(45deg, #ff6b6b, #feca57);
            color: #fff;
            padding: 15px 25px;
            border-radius: 30px;
            font-size: 1.5rem;
            font-weight: bold;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            opacity: 0;
            transform: translateY(-20px);
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .combo.show {
            opacity: 1;
            transform: translateY(0);
        }

        .combo.pop {
            animation: comboPop 0.3s ease;
        }

        @keyframes comboPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .combo.mega-combo {
            background: linear-gradient(45deg, #f093fb, #f5576c, #4facfe);
            background-size: 200% 200%;
            animation: gradientShift 0.5s ease infinite, comboGlow 0.3s ease;
            font-size: 2rem;
            padding: 20px 35px;
            box-shadow: 0 0 30px rgba(240, 147, 251, 0.6), 0 0 60px rgba(79, 172, 254, 0.4);
        }

        @keyframes comboGlow {
            0%, 100% { box-shadow: 0 0 30px rgba(240, 147, 251, 0.6); }
            50% { box-shadow: 0 0 50px rgba(240, 147, 251, 0.9), 0 0 80px rgba(79, 172, 254, 0.6); }
        }

        /* 屏幕震动 */
        .screen-shake {
            animation: screenShake 0.5s ease;
        }

        @keyframes screenShake {
            0%, 100% { transform: translate(0, 0); }
            10% { transform: translate(-10px, -10px); }
            20% { transform: translate(10px, 10px); }
            30% { transform: translate(-10px, 10px); }
            40% { transform: translate(10px, -10px); }
            50% { transform: translate(-10px, -10px); }
            60% { transform: translate(10px, 10px); }
            70% { transform: translate(-10px, 10px); }
            80% { transform: translate(10px, -10px); }
            90% { transform: translate(-10px, -10px); }
        }

        /* 闪光效果 */
        .flash-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
            pointer-events: none;
            opacity: 0;
            z-index: 9999;
        }

        .flash-overlay.flash {
            animation: flashEffect 0.5s ease-out;
        }

        @keyframes flashEffect {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* 加载状态 */
        .loading {
            opacity: 0.5;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧞 Hello Claw</h1>
        <p class="subtitle">点击神灯，许愿计数！</p>
        
        <div class="count-display" id="countDisplay">0</div>
        
        <button class="claw-button" id="clawButton">
            <span class="emoji">🪄</span>
            点击我！
        </button>
        
        <div class="timer-container">
            <div class="timer-label">⏱️ 重置倒计时</div>
            <div class="timer-bar">
                <div class="timer-progress" id="timerProgress"></div>
            </div>
            <div class="timer-display" id="timerDisplay">5.0s</div>
        </div>
    </div>

    <div class="combo" id="combo">🔥 Combo x1</div>
    <div class="flash-overlay" id="flashOverlay"></div>

    <script>
        // 环境变量注入：Render 构建时会自动替换
        const API_BASE = 'http://localhost:10000/api';
        
        let count = 0;
        let combo = 0;
        let comboTimer = null;
        let isClicking = false;
        
        // 倒计时相关
        const RESET_TIME = 5000; // 5 秒
        let timeRemaining = RESET_TIME;
        let lastUpdateTime = Date.now();
        let timerRunning = true;

        const countDisplay = document.getElementById('countDisplay');
        const clawButton = document.getElementById('clawButton');
        const comboDisplay = document.getElementById('combo');
        const timerProgress = document.getElementById('timerProgress');
        const timerDisplay = document.getElementById('timerDisplay');
        const flashOverlay = document.getElementById('flashOverlay');

        // 获取当前计数
        async function fetchCount() {
            try {
                const response = await fetch(`${API_BASE}/count`);
                const data = await response.json();
                count = data.count;
                updateDisplay(false);
            } catch (error) {
                console.error('Failed to fetch count:', error);
            }
        }

        // 增加计数
        async function incrementCount() {
            if (isClicking) return;
            isClicking = true;

            try {
                const response = await fetch(`${API_BASE}/increment`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ amount: 1 }),
                });

                const data = await response.json();
                count = data.count;
                updateDisplay(true);
                
                // 根据连击数创建不同强度的特效
                createParticles();
                updateCombo();
                
                // 检查是否达到特殊连击阈值
                if (combo % 50 === 0 && combo > 0) {
                    createExplosionEffect();
                    triggerScreenShake();
                    triggerFlash();
                } else if (combo % 10 === 0 && combo > 0) {
                    createLargeParticles();
                    createLargeRipple();
                }
            } catch (error) {
                console.error('Failed to increment:', error);
                // 本地计数作为后备
                count++;
                updateDisplay(true);
                createParticles();
                updateCombo();
            }

            setTimeout(() => {
                isClicking = false;
            }, 100);
        }

        // 重置计数（倒计时结束自动调用）
        async function resetCount() {
            try {
                await fetch(`${API_BASE}/reset`, {
                    method: 'POST',
                });
            } catch (error) {
                console.error('Failed to reset:', error);
            }
            count = 0;
            combo = 0;
            timeRemaining = RESET_TIME;
            updateDisplay(false);
            hideCombo();
            updateTimerDisplay();
            clawButton.classList.remove('mega-mode');
        }

        // 更新显示
        function updateDisplay(animate) {
            countDisplay.textContent = count;
            
            if (animate) {
                countDisplay.classList.add('pop');
                setTimeout(() => {
                    countDisplay.classList.remove('pop');
                }, 100);
            }
        }

        // 更新连击
        function updateCombo() {
            combo++;
            
            // 检查是否达到 50 连击
            const isMegaCombo = combo >= 50 || combo % 50 === 0;
            
            if (combo > 1) {
                comboDisplay.textContent = `🔥 Combo x${combo}`;
                comboDisplay.classList.add('show', 'pop');
                
                // 50 连击以上启用 mega 模式
                if (isMegaCombo) {
                    comboDisplay.classList.add('mega-combo');
                    clawButton.classList.add('mega-mode');
                } else if (combo >= 10) {
                    comboDisplay.classList.remove('mega-combo');
                }
                
                setTimeout(() => {
                    comboDisplay.classList.remove('pop');
                }, 100);
            } else {
                comboDisplay.textContent = `🔥 Combo x${combo}`;
                comboDisplay.classList.add('show');
            }

            // 清除之前的定时器
            if (comboTimer) {
                clearTimeout(comboTimer);
            }

            // 2 秒后连击消失
            comboTimer = setTimeout(() => {
                hideCombo();
                combo = 0;
                clawButton.classList.remove('mega-mode');
            }, 2000);
        }

        // 隐藏连击
        function hideCombo() {
            comboDisplay.classList.remove('show', 'mega-combo');
        }

        // 更新倒计时
        function updateTimer() {
            const now = Date.now();
            const delta = now - lastUpdateTime;
            lastUpdateTime = now;
            
            if (timerRunning && timeRemaining > 0) {
                timeRemaining -= delta;
                
                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    resetCount();
                }
                
                updateTimerDisplay();
            }
            
            requestAnimationFrame(updateTimer);
        }

        // 更新倒计时显示
        function updateTimerDisplay() {
            const seconds = timeRemaining / 1000;
            timerDisplay.textContent = `${seconds.toFixed(1)}s`;
            
            const progress = (timeRemaining / RESET_TIME) * 100;
            timerProgress.style.width = `${progress}%`;
            
            // 根据剩余时间改变颜色
            timerProgress.classList.remove('warning', 'danger');
            if (seconds <= 1) {
                timerProgress.classList.add('danger');
            } else if (seconds <= 2) {
                timerProgress.classList.add('warning');
            }
        }

        // 创建粒子效果
        function createParticles() {
            const emojis = ['✨', '🌟', '⭐', '💫', '🧞', '🪄'];
            const buttonRect = clawButton.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;

            // 根据连击数增加粒子数量
            let particleCount = 12;
            if (combo >= 50) particleCount = 50;
            else if (combo >= 10) particleCount = 24;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const angle = (i / particleCount) * Math.PI * 2;
                const distance = 150 + Math.random() * 100;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rot = (Math.random() - 0.5) * 720;
                
                particle.style.left = `${centerX}px`;
                particle.style.top = `${centerY}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                particle.style.setProperty('--rot', `${rot}deg`);
                
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 1000);
            }
        }

        // 创建大型粒子（10 连击）
        function createLargeParticles() {
            const emojis = ['🎆', '🎇', '💥', '🌈', '⚡'];
            const buttonRect = clawButton.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;

            for (let i = 0; i < 8; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle particle-large';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const angle = (i / 8) * Math.PI * 2;
                const distance = 200 + Math.random() * 150;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                const rot = (Math.random() - 0.5) * 720;
                
                particle.style.left = `${centerX}px`;
                particle.style.top = `${centerY}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                particle.style.setProperty('--rot', `${rot}deg`);
                
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 1500);
            }
        }

        // 创建爆炸粒子（50 连击）
        function createExplosionEffect() {
            const emojis = ['🎆', '🎇', '💥', '🌟', '✨', '🧞', '⚡', '🌈'];
            const buttonRect = clawButton.getBoundingClientRect();
            const centerX = buttonRect.left + buttonRect.width / 2;
            const centerY = buttonRect.top + buttonRect.height / 2;

            for (let i = 0; i < 30; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle particle-explosion';
                particle.textContent = emojis[Math.floor(Math.random() * emojis.length)];
                
                const angle = (i / 30) * Math.PI * 2;
                const distance = 300 + Math.random() * 200;
                const tx = Math.cos(angle) * distance;
                const ty = Math.sin(angle) * distance;
                
                particle.style.left = `${centerX}px`;
                particle.style.top = `${centerY}px`;
                particle.style.setProperty('--tx', `${tx}px`);
                particle.style.setProperty('--ty', `${ty}px`);
                
                document.body.appendChild(particle);

                setTimeout(() => {
                    particle.remove();
                }, 2000);
            }
        }

        // 创建大型波纹（10 连击）
        function createLargeRipple() {
            for (let i = 0; i < 3; i++) {
                setTimeout(() => {
                    const ripple = document.createElement('div');
                    ripple.className = 'ripple ripple-large';
                    ripple.style.width = '150px';
                    ripple.style.height = '150px';
                    ripple.style.left = '50%';
                    ripple.style.top = '50%';
                    ripple.style.marginLeft = '-75px';
                    ripple.style.marginTop = '-75px';
                    
                    document.body.appendChild(ripple);

                    setTimeout(() => {
                        ripple.remove();
                    }, 1000);
                }, i * 150);
            }
        }

        // 创建波纹效果
        function createRipple(event) {
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            ripple.style.width = '100px';
            ripple.style.height = '100px';
            ripple.style.left = `${event.clientX - 50}px`;
            ripple.style.top = `${event.clientY - 50}px`;
            
            document.body.appendChild(ripple);

            setTimeout(() => {
                ripple.remove();
            }, 600);
        }

        // 触发屏幕震动（50 连击）
        function triggerScreenShake() {
            document.body.classList.add('screen-shake');
            setTimeout(() => {
                document.body.classList.remove('screen-shake');
            }, 500);
        }

        // 触发闪光效果（50 连击）
        function triggerFlash() {
            flashOverlay.classList.add('flash');
            setTimeout(() => {
                flashOverlay.classList.remove('flash');
            }, 500);
        }

        // 事件监听
        clawButton.addEventListener('click', (e) => {
            clawButton.classList.add('clicked');
            setTimeout(() => {
                clawButton.classList.remove('clicked');
            }, 300);
            
            createRipple(e);
            incrementCount();
        });

        // 支持键盘空格键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                clawButton.click();
            }
        });

        // 初始化
        fetchCount();
        lastUpdateTime = Date.now();
        updateTimer();
    </script>
</body>
</html>
